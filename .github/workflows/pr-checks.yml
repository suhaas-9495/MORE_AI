name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  pr-eval:
    name: Eval on PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run regression + post PR comment
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: https://cloud.langfuse.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          python scripts/run_regression_pr.py

      - name: Install deps
        run: |
          pip install fastapi uvicorn pydantic pydantic-settings \
            python-jose "passlib[bcrypt]" "bcrypt==4.0.1" python-multipart \
            httpx python-dotenv pytest pytest-asyncio \
            langchain langchain-groq langgraph \
            chromadb sentence-transformers rank-bm25 \
            langchain-text-splitters tiktoken \
            slowapi boto3 "langfuse==2.60.0" \
            tenacity rich aiohttp
          python -m spacy download en_core_web_lg