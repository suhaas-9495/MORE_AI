name: MoreAI CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install ruff
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check backend/ --ignore E501 --ignore F401

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          GROQ_API_KEY: "test-key-not-real"
          SECRET_KEY: "ci-test-secret-key-32-chars-minimum-xx"
          LANGFUSE_PUBLIC_KEY: "test"
          LANGFUSE_SECRET_KEY: "test"
          LANGFUSE_HOST: "https://cloud.langfuse.com"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_REGION: "ap-south-1"
          AWS_S3_BUCKET: "test-bucket"
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t moreai:test .

      - name: Smoke test
        run: |
          docker run -d --name moreai-test \
            -e GROQ_API_KEY="test" \
            -e SECRET_KEY="ci-test-secret-key-32-chars-minimum-xx" \
            -e LANGFUSE_PUBLIC_KEY="test" \
            -e LANGFUSE_SECRET_KEY="test" \
            -e LANGFUSE_HOST="https://cloud.langfuse.com" \
            -e AWS_ACCESS_KEY_ID="test" \
            -e AWS_SECRET_ACCESS_KEY="test" \
            -e AWS_REGION="ap-south-1" \
            -e AWS_S3_BUCKET="test-bucket" \
            -p 8000:8000 \
            moreai:test
          sleep 15
          curl -f http://localhost:8000/health || exit 1
          docker stop moreai-test