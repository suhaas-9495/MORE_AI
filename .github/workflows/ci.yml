name: MoreAI CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff only
        run: pip install ruff

      - name: Ruff lint
        run: ruff check backend/ --ignore E501 --ignore F401 --ignore F811 --ignore E402

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install fastapi uvicorn pydantic pydantic-settings \
            python-jose passlib bcrypt python-multipart \
            httpx python-dotenv pytest pytest-asyncio
          
      - name: Run health test only
        env:
          GROQ_API_KEY: "test-key"
          SECRET_KEY: "ci-test-secret-key-32-chars-minimum-xx"
          LANGFUSE_PUBLIC_KEY: "test"
          LANGFUSE_SECRET_KEY: "test"
          LANGFUSE_HOST: "https://cloud.langfuse.com"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_REGION: "ap-south-1"
          AWS_S3_BUCKET: "test-bucket"
        run: pytest tests/test_health.py::test_health -v